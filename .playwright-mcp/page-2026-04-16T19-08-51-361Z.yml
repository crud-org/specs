      - main [ref=e90]:
        - heading "Async" [level=1] [ref=e93]
        - generic [ref=e95]:
          - generic [ref=e96]:
            - paragraph [ref=e97]:
              - text: The
              - strong [ref=e98]: "\"Asyncability\""
              - text: extension allows CRUD API Participants to negotiate whether an operation should be performed synchronously or asynchronously. By default, all CRUD operations are synchronous.
            - paragraph [ref=e99]: This extension is OPTIONAL. CRUD APIs that do not support asynchronous operations are not required to implement any of the rules in this section. However, APIs that do support asynchronous operations MUST adhere to the rules below.
            - generic [ref=e100]:
              - heading "1. Negotiation" [level=2] [ref=e101]
              - link "Section titled “1. Negotiation”" [ref=e102] [cursor=pointer]:
                - /url: "#1-negotiation"
                - img [ref=e104]
                - generic [ref=e106]: Section titled “1. Negotiation”
            - separator [ref=e107]
            - paragraph [ref=e108]:
              - text: CRUD API Participants with asynchronous abilities SHOULD negotiate the synchronicity of the operation using Metadata fields, as described in
              - link "Section 3.4 Metadata" [ref=e109] [cursor=pointer]:
                - /url: /base/general/#34-metadata
              - text: . The negotiation determines whether the Server will process the operation synchronously (default) or asynchronously.
            - paragraph [ref=e110]: "The negotiation follows a simple model based on three possible Client abilities:"
            - list [ref=e111]:
              - listitem [ref=e112]:
                - strong [ref=e113]: Sync-only
                - text: (default) — the Client expects a synchronous response and does not send any async-specific Metadata.
              - listitem [ref=e114]:
                - strong [ref=e115]: Async-preferred
                - text: — the Client supports both modes but prefers an asynchronous response.
              - listitem [ref=e116]:
                - strong [ref=e117]: Async-required
                - text: — the Client only supports asynchronous operations and requires the Server to respond accordingly.
            - group [ref=e118]:
              - generic "4 rules" [ref=e119] [cursor=pointer]
            - generic [ref=e120]:
              - heading "2. Server response matrix" [level=2] [ref=e121]
              - link "Section titled “2. Server response matrix”" [ref=e122] [cursor=pointer]:
                - /url: "#2-server-response-matrix"
                - img [ref=e124]
                - generic [ref=e126]: Section titled “2. Server response matrix”
            - separator [ref=e127]
            - paragraph [ref=e128]: The Server MUST select the appropriate response behavior based on the combination of its own abilities and the Client's indicated preference. The following rules define the expected behavior for each combination.
            - paragraph [ref=e129]: "The table below summarizes the expected behavior:"
            - table [ref=e130]:
              - rowgroup [ref=e131]:
                - row "Client sync-only Client async-preferred Client async-required" [ref=e132]:
                  - columnheader [ref=e133]
                  - columnheader "Client sync-only" [ref=e134]
                  - columnheader "Client async-preferred" [ref=e135]
                  - columnheader "Client async-required" [ref=e136]
              - rowgroup [ref=e137]:
                - row "Server sync-only Sync response Sync response (MAY fail) MUST fail" [ref=e138]:
                  - cell "Server sync-only" [ref=e139]:
                    - strong [ref=e140]: Server sync-only
                  - cell "Sync response" [ref=e141]
                  - cell "Sync response (MAY fail)" [ref=e142]
                  - cell "MUST fail" [ref=e143]
                - row "Server async-only MUST fail Async response Async response" [ref=e144]:
                  - cell "Server async-only" [ref=e145]:
                    - strong [ref=e146]: Server async-only
                  - cell "MUST fail" [ref=e147]
                  - cell "Async response" [ref=e148]
                  - cell "Async response" [ref=e149]
                - row "Server both Sync response Async response Async response" [ref=e150]:
                  - cell "Server both" [ref=e151]:
                    - strong [ref=e152]: Server both
                  - cell "Sync response" [ref=e153]
                  - cell "Async response" [ref=e154]
                  - cell "Async response" [ref=e155]
            - group [ref=e156]:
              - generic "4 rules" [ref=e157] [cursor=pointer]
            - generic [ref=e158]:
              - heading "3. Operation polling" [level=2] [ref=e159]
              - link "Section titled “3. Operation polling”" [ref=e160] [cursor=pointer]:
                - /url: "#3-operation-polling"
                - img [ref=e162]
                - generic [ref=e164]: Section titled “3. Operation polling”
            - separator [ref=e165]
            - paragraph [ref=e166]:
              - text: After the Server accepts an asynchronous operation, the Client MUST be able to check the operation status. The Server provides an
              - strong [ref=e167]: "\"Operation Result URL\""
              - text: that the Client can poll periodically.
            - paragraph [ref=e168]: "The polling flow is:"
            - list [ref=e169]:
              - listitem [ref=e170]:
                - text: Server accepts the async operation and returns an
                - strong [ref=e171]: Operation Result URL
                - text: in the response Metadata.
              - listitem [ref=e172]: Client periodically polls the Operation Result URL.
              - listitem [ref=e173]:
                - text: "The URL responds with one of three states:"
                - strong [ref=e174]: pending
                - text: (still running),
                - strong [ref=e175]: success
                - text: (completed with results), or
                - strong [ref=e176]: failure
                - text: (completed with error).
            - group [ref=e177]:
              - generic "4 rules" [ref=e178] [cursor=pointer]
            - generic [ref=e179]:
              - heading "4. Callback notifications" [level=2] [ref=e180]
              - link "Section titled “4. Callback notifications”" [ref=e181] [cursor=pointer]:
                - /url: "#4-callback-notifications"
                - img [ref=e183]
                - generic [ref=e185]: Section titled “4. Callback notifications”
            - separator [ref=e186]
            - paragraph [ref=e187]: As an alternative to polling, the Client MAY specify a callback URL (a "webhook") where the Server MUST send the operation results upon completion.
            - paragraph [ref=e188]: The callback mechanism complements polling — it does not replace it. The Server MUST always provide the polling URL even when callbacks are configured.
            - group [ref=e189]:
              - generic "3 rules" [ref=e190] [cursor=pointer]
